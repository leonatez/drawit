name: Deploy to CapRover

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tarball
        run: |
          tar -czf /tmp/deploy.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='data' \
            --exclude='.next' \
            --exclude='logs' \
            .
          echo "Tarball size: $(du -sh /tmp/deploy.tar.gz | cut -f1)"

      - name: Login to CapRover
        id: login
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.CAPROVER_SERVER }}/api/v2/login" \
            -H "Content-Type: application/json" \
            -d "{\"password\": \"${{ secrets.CAPROVER_PASSWORD }}\"}")
          echo "Login response: $RESPONSE"
          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "Token obtained: ${TOKEN:0:10}..."

      - name: Upload and deploy
        run: |
          echo "Uploading to ${{ secrets.CAPROVER_SERVER }}/api/v2/user/apps/appData/${{ secrets.CAPROVER_APP_NAME }}"
          RESPONSE=$(curl -s -X POST \
            "${{ secrets.CAPROVER_SERVER }}/api/v2/user/apps/appData/${{ secrets.CAPROVER_APP_NAME }}" \
            -H "x-captain-auth: ${{ steps.login.outputs.token }}" \
            -F "sourceFile=@/tmp/deploy.tar.gz" \
            --max-time 60)
          echo "Upload response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
import sys, json
d = json.load(sys.stdin)
if d.get('status') == 100:
    print('Upload accepted by CapRover')
else:
    print('Upload failed:', d)
    sys.exit(1)
"

      - name: Wait for build
        run: |
          TOKEN="${{ steps.login.outputs.token }}"
          for i in $(seq 1 36); do
            RESPONSE=$(curl -s "${{ secrets.CAPROVER_SERVER }}/api/v2/user/apps/appData/${{ secrets.CAPROVER_APP_NAME }}" \
              -H "x-captain-auth: $TOKEN")
            BUILDING=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['isAppBuilding'])")
            echo "[$i/36] Building: $BUILDING"
            [ "$BUILDING" = "False" ] && break
            sleep 10
          done
          FAILED=$(curl -s "${{ secrets.CAPROVER_SERVER }}/api/v2/user/apps/appData/${{ secrets.CAPROVER_APP_NAME }}" \
            -H "x-captain-auth: $TOKEN" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['isBuildFailed'])")
          [ "$FAILED" = "True" ] && echo "Build failed!" && exit 1
          echo "Deploy successful!"
